<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vienovo – Purchase Request System</title>
<style>
:root{--bg:#f4f6f9;--card:#fff;--text:#1e293b;--muted:#64748b;--primary:#2563eb;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--border:#e2e8f0;--r:8px}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:var(--bg);color:var(--text);font-size:14px}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1e3a8a}
.auth-card{background:var(--card);border-radius:12px;padding:2.5rem;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.auth-card h2{font-size:1.3rem;margin-bottom:.25rem}
#app{display:none}
header{background:var(--card);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;align-items:center;gap:.75rem;height:52px;position:sticky;top:0;z-index:50}
nav{display:flex;gap:.15rem;overflow-x:auto;flex:1;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{padding:.35rem .7rem;border:none;background:none;border-radius:6px;cursor:pointer;font-size:.77rem;white-space:nowrap;color:var(--muted);transition:background .15s}
nav button:hover{background:#f1f5f9;color:var(--text)}
nav button.active{background:#dbeafe;color:var(--primary);font-weight:600}
.hdr-r{display:flex;align-items:center;gap:.5rem;margin-left:auto;flex-shrink:0}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
main{max-width:1280px;margin:0 auto;padding:1.25rem 1rem}
.view{display:none}.view.active{display:block}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.ph h2{font-size:1rem;font-weight:700}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:1.25rem;margin-bottom:1rem}
.card h3{font-size:.88rem;font-weight:700;margin-bottom:.75rem;color:var(--text)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.6rem;margin-bottom:1rem}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;border-left:4px solid var(--primary)}
.kpi.kw{border-left-color:var(--warning)}.kpi.ks{border-left-color:var(--success)}.kpi.kd{border-left-color:var(--danger)}
.kpi p{font-size:.7rem;color:var(--muted);margin-bottom:.2rem;text-transform:uppercase;letter-spacing:.03em}
.kpi h3{font-size:1.6rem;font-weight:700;line-height:1.1;color:var(--text)}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem}
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:.6rem;margin-bottom:.6rem}
.fg{margin-bottom:.65rem}
label{display:block;font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.2rem;text-transform:uppercase;letter-spacing:.03em}
input,select,textarea{width:100%;padding:.45rem .65rem;border:1px solid var(--border);border-radius:var(--r);font-size:.85rem;background:var(--card);color:var(--text);line-height:1.4}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
input[readonly]{background:#f8fafc;color:var(--muted);cursor:default}
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem .9rem;border:none;border-radius:var(--r);cursor:pointer;font-size:.82rem;font-weight:600;transition:opacity .15s,background .15s;white-space:nowrap}
.sm{padding:.28rem .55rem;font-size:.74rem}
.bp{background:var(--primary);color:#fff}.bp:hover{background:#1d4ed8}
.bs{background:var(--success);color:#fff}.bs:hover{background:#059669}
.bw{background:var(--warning);color:#000}
.bd{background:var(--danger);color:#fff}.bd:hover{background:#dc2626}
.bg{background:transparent;border:1px solid var(--border);color:var(--text)}.bg:hover{background:#f8fafc}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{padding:.55rem .7rem;text-align:left;background:#f8fafc;border-bottom:1px solid var(--border);font-size:.69rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
td{padding:.52rem .7rem;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.tc{text-align:center}.tr{text-align:right}
.itbl td input,.itbl td select{padding:.3rem .4rem;min-width:60px;margin:0}
.tot-cell{font-weight:700;background:#f8fafc!important;text-align:right}
.sum-row td{font-weight:700;border-top:2px solid var(--border);background:#f8fafc}
.b{display:inline-block;padding:.18rem .5rem;border-radius:10px;font-size:.69rem;font-weight:700;white-space:nowrap}
.b-drf{background:#f1f5f9;color:#475569}
.b-sub{background:#dbeafe;color:#1e40af}
.b-sur{background:#fef3c7;color:#92400e}
.b-fin{background:#ede9fe;color:#5b21b6}
.b-apr{background:#d1fae5;color:#065f46}
.b-rej{background:#fee2e2;color:#991b1b}
.b-poc{background:#e0f2fe;color:#0369a1}
.b-par{background:#ffedd5;color:#9a3412}
.b-rec{background:#dcfce7;color:#166534}
.b-sap{background:#f3e8ff;color:#7e22ce}
.b-ovd{background:#fee2e2;color:#991b1b}
.b-atr{background:#fef3c7;color:#92400e}
.b-ont{background:#d1fae5;color:#065f46}
.b-iss{background:#e0f2fe;color:#0369a1}
.b-pen{background:#f1f5f9;color:#475569}
.b-awd{background:#d1fae5;color:#065f46}
.alert{padding:.65rem .9rem;border-radius:var(--r);margin-bottom:.75rem;font-size:.82rem;border-left:3px solid}
.ald{background:#fee2e2;border-color:var(--danger);color:#7f1d1d}
.alw{background:#fef3c7;border-color:var(--warning);color:#78350f}
.ali{background:#dbeafe;border-color:var(--primary);color:#1e3a8a}
.als{background:#d1fae5;border-color:var(--success);color:#064e3b}
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
#modal-bg.open{display:flex}
.modal-box{background:var(--card);border-radius:12px;width:90%;max-width:620px;max-height:90vh;overflow-y:auto;padding:1.5rem}
.modal-lg{max-width:960px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.mh h3{font-size:.95rem;font-weight:700}
.xbtn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);line-height:1;padding:.1rem .3rem}
#toasts{position:fixed;bottom:1rem;right:1rem;display:flex;flex-direction:column;gap:.4rem;z-index:999;pointer-events:none}
.toast{padding:.6rem 1rem;border-radius:var(--r);color:#fff;font-size:.82rem;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:300px;animation:si .2s ease;pointer-events:all}
.ts{background:var(--success)}.te{background:var(--danger)}.tw2{background:var(--warning);color:#000}
@keyframes si{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.alog{max-height:160px;overflow-y:auto;background:#f8fafc;border:1px solid var(--border);border-radius:var(--r);padding:.6rem}
.ae{padding:.28rem 0;border-bottom:1px solid var(--border);font-size:.78rem;line-height:1.5}
.ae:last-child{border-bottom:none}
.dup-warn{background:#fff7ed;border:1px solid #fed7aa;border-radius:var(--r);padding:.6rem .8rem;margin-bottom:.6rem;font-size:.8rem;color:#9a3412;display:none}
.steps{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1rem}
.step{flex:1;padding:.45rem .3rem;font-size:.7rem;text-align:center;background:#f8fafc;border-right:1px solid var(--border)}
.step:last-child{border-right:none}
.step.done{background:#d1fae5;color:#065f46}
.step.cur{background:#dbeafe;color:#1e40af;font-weight:700}
.step.rej{background:#fee2e2;color:#991b1b}
.sep{border:none;border-top:1px solid var(--border);margin:1rem 0}
@media(max-width:640px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.fr{grid-template-columns:1fr}}
@media print{header,.btn,#toasts,nav{display:none!important}}
</style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="auth-screen">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:1.25rem;padding:1.25rem;background:linear-gradient(135deg,#1e3a8a,#2563eb);border-radius:10px">
      <img src="https://vienovo.ph/wp-content/uploads/2019/01/Logo_Vienovo-Feed-for-Life-White-04-600x270.png"

<!-- ── APP ── -->
<div id="app">
  <header>

           alt="Vienovo PMS" style="height:28px;width:auto">
    </a>
    <nav id="main-nav"></nav>

<!-- ── MODAL ── -->
<div id="modal-bg" onclick="if(event.target===this)closeModal()">

    <div class="mh">
      <h3 id="modal-title">—</h3>
      <button class="xbtn" onclick="closeModal()">&#10005;</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>
<div id="toasts"></div>

<script>
'use strict';

/* ── SEED DATA ── */

  {id:'u6',name:'Rejean Alamo',role:'employee',dept:'OPERATIONS',loc:'ALAE'},
  {id:'u7',name:'HOREB SHARED',role:'employee',dept:'OPERATIONS',loc:'HOREB'},
  {id:'u8',name:'Operations Supervisor',role:'supervisor',dept:'OPERATIONS',loc:'ALL'},

  {id:'u14',name:'Mikael Joshua Agpalza',role:'employee',dept:'OPERATIONS',loc:'ISABELA'},
  {id:'u15',name:'Rico Icoy',role:'employee',dept:'MAINTENANCE',loc:'ARGAO'},
  {id:'u16',name:'Keith Fajardo',role:'employee',dept:'PRODUCTION',loc:'BUKID'},
  {id:'u17',name:'HR Officer',role:'employee',dept:'HR',loc:'MAKATI'},
  {id:'u18',name:'Warehouse Account',role:'employee',dept:'WAREHOUSE',loc:'BUKID'},
];
const SEED_VENDORS=[
  'BEARING CENTER & MACHINERY, INC','KING GOLDEN TALE TECH INDUSTRIAL OPC',
  'CGP MECHANICS ELECTRICAL AND INDUSTRIAL SUPPLIES TRADING','ZYIOZHU INDUSTRIAL SUPPLY',
  'VALU-SERVE COMMERCIAL INCORPORATED','FBMC PNEUMATICS TRADING','GDSM MARKETING',
  'ORO SOLID HARDWARE, INC.','AVP ELECTRICAL AND INDUSTRIAL SUPPLIES TRADING',
  '3J GOLDEN DRAGON INDUSTRIAL MACHINERY CORPORATION','CIMECH SYSTEMS INDUSTRIES, INC',
  'FRISCO FOUNDRY AND MACHINERY CORP.','ENERBILT ENGINEERING WORKS AND SUPPLIES',
  'GOLDTOWN INDUSTRIAL SALES CORPORATION','MIDSOUTH - CEBU SEWING MACHINE SALES CENTER',
  'UNIFIRE INDUSTRIAL ENTERPRISES','BRAVSKI TRADING','LCG MARKETING PHILIPPINES CORPORATION',
  'AERO-SEAL INDUSTRIAL TECHNOLOGIES, INC.','JMS PRIME SOLUTIONS INC.','C CH TRADING',
  'RBER INDUSTRIAL AND TRADING CORP.','UBI YARN MANUFACTURING CORPORATION',
  'LUBRI-CHEM PHILIPPINES DISTRIBUTOR, INC.','UNITED BEARING INDUSTRIAL CORPORATION',
  'AIRTAC ENTERPRISES PHILIPPINES CO. LTD. CORP.','SHURFIT INCORPORATED','MCKUPLER INC',
  'GREATPHIL ENTERPRISES INC.','UP MARKETING','MACKUN HARDWARE','XIMXINCHAI ENGINEERING SERVICES',
  'R. DAN AND CO., INC.',
];
const LOCS=['AC','ALAE','ARGAO','BUKID','HOREB','ISABELA','MAKATI'];
const DEPTS=['OPERATIONS','PRODUCTION','MAINTENANCE','WAREHOUSE','HR','FINANCE','ADMIN'];
const UOMS=['PIECE','SET','BOX','LITER','GALLON','METER','KG','BAG','ROLL','PAIR','LOT'];
const FIN_THRESHOLD=50000;

/* ── INDEXED DB ── */
const DB=(()=>{
  let _db=null;
  const open=()=>new Promise((ok,err)=>{
    const r=indexedDB.open('pms_v3',1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      ['prs','pos','grpos','vendors','canvass'].forEach(s=>{
        if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:'id'});
      });
    };
    r.onsuccess=e=>{_db=e.target.result;ok()};
    r.onerror=e=>err(e);
  });
  const tx=(s,m='readonly')=>_db.transaction(s,m).objectStore(s);
  const all=s=>new Promise((ok,er)=>{const r=tx(s).getAll();r.onsuccess=()=>ok(r.result);r.onerror=er});
  const get=(s,id)=>new Promise((ok,er)=>{const r=tx(s).get(id);r.onsuccess=()=>ok(r.result);r.onerror=er});
  const put=(s,o)=>new Promise((ok,er)=>{const r=tx(s,'readwrite').put(o);r.onsuccess=()=>ok(r.result);r.onerror=er});
  const del=(s,id)=>new Promise((ok,er)=>{const r=tx(s,'readwrite').delete(id);r.onsuccess=()=>ok();r.onerror=er});
  const seed=async()=>{
    const vs=await all('vendors');
    if(!vs.length){
      const unique=[...new Set(SEED_VENDORS)];
      for(const name of unique)await put('vendors',{id:'v_'+uid(),name,contact:'',email:'',phone:'',address:''});
    }
  };
  return{open,all,get,put,del,seed};
})();

/* ── UTILS ── */
let _pc=1000,_oc=1000,_gc=1000;
const uid=()=>'id'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const nextPR=()=>'PR-'+String(++_pc).padStart(4,'0');
const nextPO=()=>'PO-'+String(++_oc).padStart(4,'0');
const nextGR=()=>'GR-'+String(++_gc).padStart(4,'0');
const fmt=n=>new Intl.NumberFormat('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);
const fmtM=n=>'₱'+fmt(n);
const fmtD=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'}):'—';
const now=()=>new Date().toISOString();
const today=()=>new Date().toISOString().split('T')[0];
const daysApart=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
const subtotal=items=>(items||[]).reduce((s,i)=>s+(+i.qty||0)*(+i.unitCost||0),0);

function toast(msg,type='s'){
  const d=document.createElement('div');
  d.className='toast t'+(type==='s'?'s':type==='e'?'e':'w2');
  d.textContent=msg;
  document.getElementById('toasts').appendChild(d);
  setTimeout(()=>d.remove(),3200);
}
function openModal(title,html,wide=false){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal-box').className='modal-box'+(wide?' modal-lg':'');
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open')}

function sBadge(s){
  const map={DRAFT:'b-drf',SUBMITTED:'b-sub','SUPERVISOR REVIEW':'b-sur','FINANCE REVIEW':'b-fin',
    APPROVED:'b-apr',REJECTED:'b-rej','PO CREATED':'b-poc',PARTIAL:'b-par',
    RECEIVED:'b-rec','SAP POSTED':'b-sap',ISSUED:'b-iss',PENDING:'b-pen',AWARDED:'b-awd'};
  return`<span class="b ${map[s]||'b-drf'}">${esc(s)}</span>`;
}
function delBadge(actual,target){
  if(actual==null||target==null)return'<span class="b b-drf">—</span>';
  const d=target-actual;
  if(d<0)return`<span class="b b-ovd">OVERDUE ${Math.abs(d)}d</span>`;
  if(d<=3)return`<span class="b b-atr">AT RISK +${d}d</span>`;
  return`<span class="b b-ont">ON TRACK</span>`;
}
function _csv(rows,fn){
  if(!rows.length){toast('No data','w');return;}
  const h=Object.keys(rows[0]),sep=',';
  const csv=[h.join(sep),...rows.map(r=>h.map(k=>{
    const v=String(r[k]??'').replace(/"/g,'""');
    return v.includes(sep)||v.includes('\n')?`"${v}"`:v;
  }).join(sep))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=fn;a.click();URL.revokeObjectURL(a.href);
  toast('Exported ✓','s');
}

/* ── AUTH ── */
const Auth=(()=>{
  let cur=null;
  const login=()=>{
    const sid=document.getElementById('l-name')?.value;
    document.getElementById('auth-err').style.display='none';
    if(!sid){document.getElementById('auth-err').style.display='block';return;}
    const u=USERS.find(x=>x.id===sid);
    if(!u){document.getElementById('auth-err').style.display='block';return;}
    cur=u;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('hdr-av').textContent=u.name[0].toUpperCase();
    document.getElementById('hdr-name').textContent=u.name+' · '+u.role.toUpperCase();
    buildNav();
    Router.go('dashboard');
  };
  const logout=()=>{
    cur=null;
    document.getElementById('app').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('l-name').value='';
  };
  const can=roles=>!!cur&&(Array.isArray(roles)?roles.includes(cur.role):cur.role===roles);
  const user=()=>cur;
  return{login,logout,can,user};
})();

/* Populate login select */
(()=>{
  const sel=document.getElementById('l-name');
  const opt=document.createElement('option');
  opt.value='';opt.textContent='— Select Employee —';sel.appendChild(opt);
  USERS.forEach(u=>{
    const o=document.createElement('option');
    o.value=u.id;
    o.textContent=u.name+(u.role==='admin'?' ★':'');
    sel.appendChild(o);
  });
})();
document.getElementById('l-name').addEventListener('keydown',e=>{if(e.key==='Enter')Auth.login();});

/* ── ROUTER ── */
const Router=(()=>{
  const VIEWS=['dashboard','pr','canvass','po','grpo','approval','reports','vendors'];
  const go=async v=>{
    VIEWS.forEach(x=>document.getElementById('v-'+x).classList.remove('active'));
    document.getElementById('v-'+v).classList.add('active');
    document.querySelectorAll('#main-nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
    switch(v){
      case'dashboard':await Dashboard.render();break;
      case'pr':await PR.renderList();break;
      case'canvass':await Canvass.render();break;
      case'po':await PO.renderList();break;
      case'grpo':await GRPO.renderList();break;
      case'approval':await Approval.render();break;
      case'reports':await Reports.render();break;
      case'vendors':await Vendors.render();break;
    }
  };
  return{go};
})();

function buildNav(){
  const u=Auth.user();
  const items=[
    {v:'dashboard',label:'📊 Dashboard',roles:['admin','employee','supervisor','finance']},
    {v:'pr',label:'📝 PR',roles:['admin','employee','supervisor','finance']},
    {v:'canvass',label:'💬 Canvass',roles:['admin']},
    {v:'po',label:'📋 PO',roles:['admin']},
    {v:'grpo',label:'📦 GRPO',roles:['admin']},
    {v:'approval',label:'✅ Approvals',roles:['admin','supervisor','finance']},
    {v:'reports',label:'📈 Reports',roles:['admin','supervisor','finance']},
    {v:'vendors',label:'🏭 Vendors',roles:['admin']},
  ];
  const nav=document.getElementById('main-nav');
  nav.innerHTML='';
  items.filter(i=>i.roles.includes(u.role)).forEach(i=>{
    const b=document.createElement('button');
    b.textContent=i.label;b.dataset.v=i.v;
    b.onclick=()=>Router.go(i.v);
    nav.appendChild(b);
  });
}

/* ── DASHBOARD ── */
const Dashboard=(()=>{
  const render=async()=>{
    const[prs,pos,grpos]=await Promise.all([DB.all('prs'),DB.all('pos'),DB.all('grpos')]);
    const u=Auth.user();
    const mine=u.role==='employee'?prs.filter(p=>p.requestedById===u.id):prs;
    const pending=mine.filter(p=>['SUBMITTED','SUPERVISOR REVIEW','FINANCE REVIEW'].includes(p.status)).length;
    const approved=mine.filter(p=>p.status==='APPROVED').length;
    const overdue=mine.filter(p=>p.dateNeeded&&new Date(p.dateNeeded)<new Date()&&
      ['SUBMITTED','SUPERVISOR REVIEW','FINANCE REVIEW','APPROVED','PO CREATED'].includes(p.status)).length;
    const totalSpend=grpos.reduce((s,g)=>s+subtotal(g.items),0);
    const urgent=mine.filter(p=>{
      if(!p.dateNeeded||['DRAFT','REJECTED','SAP POSTED','RECEIVED'].includes(p.status))return false;
      return daysApart(today(),p.dateNeeded)<=3;
    }).slice(0,5);
    const recent=[...mine].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,10);
    document.getElementById('v-dashboard').innerHTML=`
      <div class="ph"><h2>Dashboard</h2>
        <span style="font-size:.75rem;color:var(--muted)">${esc(u.name)} · ${u.role.toUpperCase()} · ${esc(u.loc)}</span>
      </div>
      <div class="kpi-grid">
        <div class="kpi"><p>Total PRs</p><h3>${mine.length}</h3></div>
        <div class="kpi kw"><p>Pending</p><h3>${pending}</h3></div>
        <div class="kpi ks"><p>Approved</p><h3>${approved}</h3></div>
        <div class="kpi kd"><p>Overdue</p><h3>${overdue}</h3></div>
        <div class="kpi"><p>Active POs</p><h3>${pos.filter(p=>p.status==='ISSUED'||p.status==='PARTIAL').length}</h3></div>
        <div class="kpi ks"><p>Total Spend</p><h3 style="font-size:.9rem;margin-top:.2rem">${fmtM(totalSpend)}</h3></div>
      </div>
      ${urgent.length?`<div class="card" style="border-left:4px solid var(--danger)">
        <h3 style="color:var(--danger)">⚠️ Urgent — Needed within 3 days (${urgent.length})</h3>
        <div class="tw"><table><thead><tr><th>PR No</th><th>Requestor</th><th>Date Needed</th><th>Status</th><th>Days Left</th></tr></thead>
        <tbody>${urgent.map(p=>`<tr>
          <td><a href="#" onclick="PR.openDetail('${p.id}');return false" style="color:var(--primary);font-weight:700">${esc(p.prNo)}</a></td>
          <td>${esc(p.requestedBy)}</td><td>${fmtD(p.dateNeeded)}</td>
          <td>${sBadge(p.status)}</td>
          <td style="color:var(--danger);font-weight:700">${daysApart(today(),p.dateNeeded)}d</td>
        </tr>`).join('')}</tbody></table></div></div>`:''}
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
          <h3 style="margin:0">Recent Purchase Requests</h3>
          <button class="btn bp sm" onclick="PR.openForm()">+ New PR</button>
        </div>
        <div class="tw"><table><thead><tr>
          <th>PR No</th><th>Requestor</th><th>Location</th><th>Dept</th>
          <th>Date Needed</th><th>Total</th><th>Status</th><th>Lead Time</th>
        </tr></thead><tbody>
        ${recent.length?recent.map(p=>{
          const sub=subtotal(p.items);
          const act=p.grpoDate&&p.dateRequested?daysApart(p.dateRequested,p.grpoDate):null;
          return`<tr>
            <td><a href="#" onclick="PR.openDetail('${p.id}');return false" style="color:var(--primary);font-weight:700">${esc(p.prNo)}</a></td>
            <td>${esc(p.requestedBy)}</td><td>${esc(p.location)}</td><td>${esc(p.department)}</td>
            <td>${fmtD(p.dateNeeded)}</td><td class="tr">${fmtM(sub)}</td>
            <td>${sBadge(p.status)}</td><td>${delBadge(act,p.targetLeadTime)}</td>
          </tr>`;
        }).join(''):`<tr><td colspan="8" class="tc" style="color:var(--muted);padding:1.5rem">No PRs yet.</td></tr>`}
        </tbody></table></div>
      </div>`;
  };
  return{render};
})();

/* ── PR MODULE ── */
const PR=(()=>{
  let _eid=null;

  const renderList=async()=>{
    const u=Auth.user();
    let prs=await DB.all('prs');
    if(u.role==='employee')prs=prs.filter(p=>p.requestedById===u.id);
    prs.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    document.getElementById('v-pr').innerHTML=`
      <div class="ph"><h2>Purchase Requests</h2>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          <button class="btn bp" onclick="PR.openForm()">+ New PR</button>
          <button class="btn bg sm" onclick="PR.exportCSV()">⬇ Export CSV</button>
        </div>
      </div>
      <div class="card" style="padding:.75rem">
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          <input id="pr-q" style="width:220px" placeholder="Search PR no, item, requestor…" oninput="PR.filter()">
          <select id="pr-sf" onchange="PR.filter()" style="width:160px">
            <option value="">All Statuses</option>
            ${['DRAFT','SUBMITTED','SUPERVISOR REVIEW','FINANCE REVIEW','APPROVED','REJECTED','PO CREATED','PARTIAL','RECEIVED','SAP POSTED'].map(s=>`<option>${s}</option>`).join('')}
          </select>
          <select id="pr-lf" onchange="PR.filter()" style="width:120px">
            <option value="">All Locations</option>${LOCS.map(l=>`<option>${l}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="card" style="padding:.5rem .75rem">
        <div class="tw"><table><thead><tr>
          <th>PR No</th><th>Requested By</th><th>Location</th><th>Dept</th>
          <th>Items</th><th>Total</th><th>Date Needed</th><th>Status</th><th>Lead Time</th><th>Actions</th>
        </tr></thead><tbody id="pr-tbody">
        ${prs.length?prs.map(p=>_prRow(p)).join(''):`<tr><td colspan="10" class="tc" style="color:var(--muted);padding:2rem">
          No PRs found. <a href="#" onclick="PR.openForm();return false">Create one.</a>
        </td></tr>`}
        </tbody></table></div>
      </div>`;
  };

  const _prRow=p=>{
    const sub=subtotal(p.items);
    const act=p.grpoDate&&p.dateRequested?daysApart(p.dateRequested,p.grpoDate):null;
    const isDraft=p.status==='DRAFT';
    const canAct=Auth.can(['admin','employee','supervisor','finance']);
    return`<tr>
      <td><a href="#" onclick="PR.openDetail('${p.id}');return false" style="color:var(--primary);font-weight:700">${esc(p.prNo)}</a></td>
      <td>${esc(p.requestedBy)}</td><td>${esc(p.location)}</td><td>${esc(p.department)}</td>
      <td class="tc">${(p.items||[]).length}</td>
      <td class="tr">${fmtM(sub)}</td>
      <td>${fmtD(p.dateNeeded)}</td>
      <td>${sBadge(p.status)}</td>
      <td>${delBadge(act,p.targetLeadTime)}</td>
      <td style="white-space:nowrap;display:flex;gap:.25rem">
        ${isDraft&&canAct?`
          <button class="btn bg sm" onclick="PR.openForm('${p.id}')">Edit</button>
          <button class="btn bp sm" onclick="PR.submit('${p.id}')">Submit</button>
          <button class="btn bd sm" onclick="PR.del('${p.id}')">Del</button>`:''}
        ${!isDraft?`<button class="btn bg sm" onclick="PR.openDetail('${p.id}')">View</button>`:''}
      </td>
    </tr>`;
  };

  const filter=()=>{
    const q=(document.getElementById('pr-q')?.value||'').toLowerCase();
    const sf=(document.getElementById('pr-sf')?.value||'').toLowerCase();
    const lf=(document.getElementById('pr-lf')?.value||'').toLowerCase();
    document.querySelectorAll('#pr-tbody tr').forEach(tr=>{
      const t=tr.textContent.toLowerCase();
      tr.style.display=(!q||t.includes(q))&&(!sf||t.includes(sf))&&(!lf||t.includes(lf))?'':'none';
    });
  };

  const openForm=async(eid=null)=>{
    _eid=eid;
    const u=Auth.user();
    const pr=eid?await DB.get('prs',eid):null;
    const items=(pr?.items)||[{id:uid(),modelSpec:'',description:'',qty:1,uom:'PIECE',unitCost:0}];
    const defUser=pr?pr.requestedBy:u.name;
    openModal(eid?`Edit ${pr.prNo}`:'New Purchase Request',`
      <div id="dup-warn" class="dup-warn">⚠️ Possible duplicate — similar spec code found in an open PR.</div>
      <div class="fr">
        <div class="fg"><label>Requested By *</label>
          <select id="f-req" onchange="PR._onReqChange()">
            ${USERS.map(x=>`<option value="${esc(x.id)}" data-name="${esc(x.name)}" data-loc="${esc(x.loc)}" data-dept="${esc(x.dept)}" ${x.name===defUser?'selected':''}>${esc(x.name)}</option>`).join('')}
          </select></div>
        <div class="fg"><label>Location *</label>
          <select id="f-loc">${LOCS.map(l=>`<option ${(pr?.location||u.loc)===l?'selected':''}>${l}</option>`).join('')}</select></div>
        <div class="fg"><label>Department *</label>
          <select id="f-dept">${DEPTS.map(d=>`<option ${(pr?.department||u.dept)===d?'selected':''}>${d}</option>`).join('')}</select></div>
      </div>
      <div class="fr">
        <div class="fg"><label>Date Requested</label><input type="date" id="f-dreq" value="${pr?.dateRequested||today()}"></div>
        <div class="fg"><label>Date Needed *</label><input type="date" id="f-dneed" value="${pr?.dateNeeded||''}"></div>
        <div class="fg"><label>Target Lead Time (days)</label><input type="number" id="f-tlt" value="${pr?.targetLeadTime||7}" min="1"></div>
      </div>
      <div class="fg"><label>Category / Cost Center</label><input type="text" id="f-cat" value="${esc(pr?.category||'')}"></div>
      <div class="fg"><label>Justification *</label><textarea id="f-just" rows="2">${esc(pr?.justification||'')}</textarea></div>
      <hr class="sep">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
        <label style="margin:0;font-size:.8rem;font-weight:700">Items</label>
        <button class="btn bg sm" onclick="PR._addRow()">+ Add Item</button>
      </div>
      <div class="tw">
        <table class="itbl"><thead><tr>
          <th>#</th><th>Model / Spec Code *</th><th>Description</th>
          <th>Qty</th><th>UoM</th><th>Unit Cost (₱)</th><th>Total</th><th></th>
        </tr></thead>
        <tbody id="items-body">${items.map((it,i)=>_itemRow(it,i)).join('')}</tbody>
        <tfoot>
          <tr><td colspan="6" class="tr" style="font-size:.78rem;color:var(--muted)">Subtotal</td>
              <td class="tot-cell" id="f-sub">—</td><td></td></tr>
          <tr><td colspan="6" class="tr" style="font-size:.78rem;color:var(--muted)">VAT (12%)</td>
              <td class="tot-cell" id="f-vat">—</td><td></td></tr>
          <tr class="sum-row"><td colspan="6" class="tr">Grand Total</td>
              <td class="tot-cell" id="f-gt" style="color:var(--primary)">—</td><td></td></tr>
        </tfoot>
        </table>
      </div>
      <div id="budget-warn" class="alert alw" style="display:none;margin-top:.5rem">
        ⚠️ Total exceeds ₱50,000 — Finance approval will be required after supervisor.
      </div>
      <div style="display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap">
        <button class="btn bg" onclick="PR._save('DRAFT')">💾 Save Draft</button>
        <button class="btn bp" onclick="PR._save('SUBMITTED')">📤 Save &amp; Submit</button>
        <button class="btn bg" onclick="closeModal()">Cancel</button>
      </div>`,true);
    _recalc();
    setTimeout(_checkDup,300);
  };

  const _itemRow=(it,i)=>`
    <tr data-iid="${it.id}">
      <td style="color:var(--muted);font-size:.78rem">${i+1}</td>
      <td><input type="text" value="${esc(it.modelSpec||'')}" placeholder="e.g. SPCON0014" oninput="PR._checkDup()"></td>
      <td><input type="text" value="${esc(it.description||'')}" placeholder="Description" style="min-width:120px"></td>
      <td><input type="number" value="${it.qty||1}" min="1" step="1" oninput="PR._recalc()" style="width:68px"></td>
      <td><select style="width:85px">${UOMS.map(u=>`<option ${it.uom===u?'selected':''}>${u}</option>`).join('')}</select></td>
      <td><input type="number" value="${it.unitCost||0}" min="0" step="0.01" oninput="PR._recalc()" style="width:100px"></td>
      <td class="tot-cell">—</td>
      <td><button class="btn bd sm" onclick="this.closest('tr').remove();PR._recalc()">✕</button></td>
    </tr>`;

  const _recalc=()=>{
    let sub=0;
    document.querySelectorAll('#items-body tr').forEach(tr=>{
      const ins=tr.querySelectorAll('input');
      if(ins.length<4)return;
      const q=+ins[2]?.value||0,c=+ins[3]?.value||0,t=q*c;
      sub+=t;
      tr.querySelector('.tot-cell').textContent=fmtM(t);
    });
    const vat=sub*.12;
    const g=id=>document.getElementById(id);
    if(g('f-sub'))g('f-sub').textContent=fmtM(sub);
    if(g('f-vat'))g('f-vat').textContent=fmtM(vat);
    if(g('f-gt'))g('f-gt').textContent=fmtM(sub+vat);
    if(g('budget-warn'))g('budget-warn').style.display=sub>FIN_THRESHOLD?'block':'none';
  };

  const _addRow=()=>{
    const tbody=document.getElementById('items-body');
    if(!tbody)return;
    const it={id:uid(),modelSpec:'',description:'',qty:1,uom:'PIECE',unitCost:0};
    const div=document.createElement('tbody');
    div.innerHTML=_itemRow(it,tbody.children.length);
    tbody.appendChild(div.firstElementChild);
    _recalc();
  };

  const _onReqChange=()=>{
    const sel=document.getElementById('f-req');
    const opt=sel?.options[sel.selectedIndex];
    if(!opt)return;
    const loc=document.getElementById('f-loc');
    const dept=document.getElementById('f-dept');
    if(loc&&opt.dataset.loc&&opt.dataset.loc!=='ALL')loc.value=opt.dataset.loc;
    if(dept&&opt.dataset.dept)dept.value=opt.dataset.dept;
  };

  const _checkDup=async()=>{
    const specs=[...document.querySelectorAll('#items-body tr input[type=text]:first-of-type')]
      .map(i=>i.value.trim().toUpperCase()).filter(Boolean);
    if(!specs.length)return;
    const prs=await DB.all('prs');
    const open=prs.filter(p=>p.id!==_eid&&!['REJECTED','SAP POSTED'].includes(p.status));
    const dup=open.find(p=>(p.items||[]).some(it=>specs.includes((it.modelSpec||'').toUpperCase())));
    const w=document.getElementById('dup-warn');
    if(w)w.style.display=dup?'block':'none';
  };

  const _collectItems=()=>{
    const rows=[];
    document.querySelectorAll('#items-body tr').forEach(tr=>{
      const ins=tr.querySelectorAll('input');
      const sel=tr.querySelector('select');
      if(ins.length<4)return;
      rows.push({
        id:tr.dataset.iid||uid(),
        modelSpec:ins[0]?.value.trim()||'',
        description:ins[1]?.value.trim()||'',
        qty:+ins[2]?.value||0,
        uom:sel?.value||'PIECE',
        unitCost:+ins[3]?.value||0,
        poQty:0,grpoQty:0,
      });
    });
    return rows;
  };

  const _save=async(status)=>{
    const dneed=document.getElementById('f-dneed')?.value;
    const just=document.getElementById('f-just')?.value.trim();
    if(!dneed){toast('Date Needed is required.','e');return;}
    if(!just){toast('Justification is required.','e');return;}
    const items=_collectItems();
    if(!items.length){toast('Add at least one item.','e');return;}
    if(items.some(it=>!it.modelSpec)){toast('All items need a Spec/Model code.','e');return;}
    const u=Auth.user();
    const sel=document.getElementById('f-req');
    const selOpt=sel?.options[sel.selectedIndex];
    const reqId=selOpt?.value||u.id;
    const reqName=selOpt?.dataset.name||u.name;
    const existing=_eid?await DB.get('prs',_eid):null;
    const pr={
      id:_eid||uid(),
      prNo:existing?.prNo||nextPR(),
      requestedById:reqId,
      requestedBy:reqName,
      location:document.getElementById('f-loc')?.value||u.loc,
      department:document.getElementById('f-dept')?.value||u.dept,
      dateRequested:document.getElementById('f-dreq')?.value||today(),
      dateNeeded:dneed,
      targetLeadTime:+document.getElementById('f-tlt')?.value||7,
      category:document.getElementById('f-cat')?.value||'',
      justification:just,
      items,
      status:existing?.status||'DRAFT',
      audit:existing?.audit||[],
      createdAt:existing?.createdAt||now(),
      updatedAt:now(),
    };
    if(status==='SUBMITTED'&&pr.status==='DRAFT'){
      pr.status='SUPERVISOR REVIEW';
      pr.audit.push({action:'Submitted',by:u.name,at:new Date().toLocaleString(),note:'Forwarded for supervisor approval'});
    } else if(!pr.audit.length){
      pr.audit.push({action:'Draft saved',by:u.name,at:new Date().toLocaleString(),note:''});
    }
    await DB.put('prs',pr);
    closeModal();
    toast(status==='SUBMITTED'?`${pr.prNo} submitted!`:`${pr.prNo} saved.`,'s');
    await renderList();
  };

  const submit=async id=>{
    const pr=await DB.get('prs',id);
    if(!pr||pr.status!=='DRAFT')return;
    const u=Auth.user();
    pr.status='SUPERVISOR REVIEW';
    pr.audit=pr.audit||[];
    pr.audit.push({action:'Submitted',by:u.name,at:new Date().toLocaleString(),note:'Awaiting supervisor approval'});
    pr.updatedAt=now();
    await DB.put('prs',pr);
    toast(`${pr.prNo} submitted.`,'s');
    await renderList();
  };

  const del=async id=>{
    if(!confirm('Delete this draft PR?'))return;
    await DB.del('prs',id);
    toast('PR deleted.','s');
    await renderList();
  };

  const openDetail=async id=>{
    const pr=await DB.get('prs',id);
    if(!pr)return;
    const sub=subtotal(pr.items);
    const[canvasses,pos,grpos]=await Promise.all([DB.all('canvass'),DB.all('pos'),DB.all('grpos')]);
    const prC=canvasses.filter(c=>c.prId===id);
    const prPO=pos.find(p=>p.prId===id);
    const prGR=grpos.find(g=>g.prId===id);
    const needsFin=sub>FIN_THRESHOLD;
    const allSteps=['PR Created','Supervisor OK',needsFin?'Finance OK':null,'PO Issued','Goods Received','SAP Posted'].filter(Boolean);
    const doneMap={
      'PR Created':true,
      'Supervisor OK':['FINANCE REVIEW','APPROVED','PO CREATED','PARTIAL','RECEIVED','SAP POSTED'].includes(pr.status),
      'Finance OK':['APPROVED','PO CREATED','PARTIAL','RECEIVED','SAP POSTED'].includes(pr.status),
      'PO Issued':['PO CREATED','PARTIAL','RECEIVED','SAP POSTED'].includes(pr.status),
      'Goods Received':['RECEIVED','SAP POSTED'].includes(pr.status),
      'SAP Posted':pr.status==='SAP POSTED',
    };
    const curMap={
      'PR Created':pr.status==='SUPERVISOR REVIEW',
      'Supervisor OK':pr.status==='SUPERVISOR REVIEW'||pr.status==='FINANCE REVIEW',
      'Finance OK':pr.status==='FINANCE REVIEW',
      'PO Issued':pr.status==='APPROVED',
      'Goods Received':pr.status==='PO CREATED'||pr.status==='PARTIAL',
      'SAP Posted':pr.status==='RECEIVED',
    };
    const stepsHtml=`<div class="steps">${allSteps.map(s=>`
      <div class="step ${pr.status==='REJECTED'?'rej':doneMap[s]?'done':curMap[s]?'cur':''}">${s}</div>`).join('')}</div>`;
    const u=Auth.user();
    const actions=[];
    if(pr.status==='DRAFT'&&Auth.can(['admin','employee','supervisor','finance'])){
      actions.push(`<button class="btn bg sm" onclick="closeModal();PR.openForm('${id}')">✏️ Edit</button>`);
      actions.push(`<button class="btn bp sm" onclick="PR.submit('${id}')">📤 Submit</button>`);
    }
    if(pr.status==='APPROVED'&&Auth.can(['admin'])){
      actions.push(`<button class="btn bs sm" onclick="closeModal();PO.openCreate('${id}')">📋 Create PO</button>`);
      actions.push(`<button class="btn bg sm" onclick="Canvass.openAdd('${id}')">💬 Add Canvass</button>`);
    }
    if(pr.status==='SAP POSTED'){
      actions.push(`<span class="b b-sap">SAP Ref: ${esc(pr.sapRef||'—')}</span>`);
    }
    openModal(`${pr.prNo}`,`
      <div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.75rem;font-size:.8rem;color:var(--muted)">
        <span>📍 ${esc(pr.location)}</span><span>🏢 ${esc(pr.department)}</span>
        <span>👤 ${esc(pr.requestedBy)}</span><span>📅 ${fmtD(pr.dateNeeded)}</span>
        <span>⏱ ${pr.targetLeadTime||'—'}d target</span>
        <span style="margin-left:auto">${sBadge(pr.status)}</span>
      </div>
      ${stepsHtml}
      ${prPO?`<div class="alert ali">📋 PO: <b>${esc(prPO.poNo)}</b> · ${esc(prPO.vendor)} · ${sBadge(prPO.status)}</div>`:''}
      ${prGR?`<div class="alert als">📦 GRPO: <b>${esc(prGR.grpoNo)}</b> · ${fmtD(prGR.dateReceived)}</div>`:''}
      <div class="tw"><table><thead><tr>
        <th>#</th><th>Spec Code</th><th>Description</th><th>Req Qty</th>
        <th>PO Qty</th><th>GRPO Qty</th><th>UoM</th><th>Unit Cost</th><th>Total</th>
      </tr></thead><tbody>${(pr.items||[]).map((it,i)=>`<tr>

      DateRequested:p.dateRequested,DateNeeded:p.dateNeeded,

      Justification:p.justification||'',CreatedAt:p.createdAt,
    })));
    _csv(rows,`PRs_${today()}.csv`);
  };

  return{renderList,openForm,openDetail,submit,del,filter,exportCSV,

/* ── CANVASS ── */
const Canvass=(()=>{
  const render=async()=>{
    const[prs,cs]=await Promise.all([DB.all('prs'),DB.all('canvass')]);
    document.getElementById('v-canvass').innerHTML=`
      <div class="ph"><h2>Canvass / Quotations</h2>
        <button class="btn bp" onclick="Canvass.openAdd()">+ Add Quote</button>
      </div>
      <div class="card"><div class="tw"><table><thead><tr>
        <th>PR No</th><th>Location</th><th>Supplier</th><th>Amount</th>
        <th>Delivery Days</th><th>Notes</th><th>Status</th><th>Actions</th>
      </tr></thead><tbody>
      ${cs.length?cs.map(c=>{
        const pr=prs.find(p=>p.id===c.prId);
        return`<tr>
          <td>${pr?`<a href="#" onclick="PR.openDetail('${pr.id}');return false" style="color:var(--primary)">${esc(pr.prNo)}</a>`:'—'}</td>
          <td>${esc(pr?.location||'')}</td><td>${esc(c.supplier)}</td>
          <td class="tr">${fmtM(c.amount)}</td><td class="tc">${c.days||'—'}d</td>
          <td>${esc(c.notes||'')}</td><td>${sBadge(c.status||'PENDING')}</td>
          <td>${c.status!=='AWARDED'?
            `<button class="btn bs sm" onclick="Canvass.award('${c.id}')">Award</button>`:'—'}
          </td>
        </tr>`;
      }).join(''):`<tr><td colspan="8" class="tc" style="color:var(--muted);padding:1.5rem">No canvass entries yet.</td></tr>`}
      </tbody></table></div></div>`;
  };

  const openAdd=async(prId=null)=>{
    const[prs,vendors]=await Promise.all([DB.all('prs'),DB.all('vendors')]);
    const eligible=prs.filter(p=>['SUPERVISOR REVIEW','FINANCE REVIEW','APPROVED'].includes(p.status));
    openModal('Add Canvass Quote',`
      <div class="fg"><label>Purchase Request *</label>
        <select id="c-prid">
          <option value="">— Select PR —</option>
          ${eligible.map(p=>`<option value="${p.id}" ${p.id===prId?'selected':''}>${esc(p.prNo)} · ${esc(p.location)} · ${esc(p.requestedBy)}</option>`).join('')}
        </select></div>
      <div class="fr">
        <div class="fg"><label>Supplier *</label>
          <select id="c-sup">
            <option value="">— Select —</option>
            ${vendors.map(v=>`<option>${esc(v.name)}</option>`).join('')}
          </select></div>
        <div class="fg"><label>Contact Person</label><input type="text" id="c-con" placeholder="Name"></div>
      </div>
      <div class="fr">
        <div class="fg"><label>Quoted Amount (₱) *</label><input type="number" id="c-amt" min="0" step="0.01"></div>
        <div class="fg"><label>Delivery Days</label><input type="number" id="c-days" min="1"></div>
      </div>
      <div class="fg"><label>Notes / Terms</label><textarea id="c-notes" rows="2"></textarea></div>
      <div style="display:flex;gap:.5rem;margin-top:.75rem">
        <button class="btn bs" onclick="Canvass.save()">Save Quote</button>
        <button class="btn bg" onclick="closeModal()">Cancel</button>
      </div>`);
  };

  const save=async()=>{
    const prId=document.getElementById('c-prid')?.value;
    const sup=document.getElementById('c-sup')?.value;
    const amt=+document.getElementById('c-amt')?.value||0;
    if(!prId){toast('Select a PR.','e');return;}
    if(!sup){toast('Select a supplier.','e');return;}
    if(!amt){toast('Enter quoted amount.','e');return;}
    const u=Auth.user();
    await DB.put('canvass',{
      id:uid(),prId,supplier:sup,
      contact:document.getElementById('c-con')?.value||'',
      amount:amt,days:+document.getElementById('c-days')?.value||0,
      notes:document.getElementById('c-notes')?.value||'',
      status:'PENDING',addedBy:u.name,addedAt:now(),
    });
    toast('Quote saved.','s');closeModal();await render();
  };

  const award=async id=>{
    if(!confirm('Award this quote?'))return;
    const c=await DB.get('canvass',id);
    if(!c)return;
    c.status='AWARDED';await DB.put('canvass',c);
    const pr=await DB.get('prs',c.prId);
    if(pr&&!['APPROVED','PO CREATED','RECEIVED','SAP POSTED'].includes(pr.status)){
      const u=Auth.user();
      pr.status='APPROVED';
      pr.audit=pr.audit||[];
      pr.audit.push({action:'Canvass Awarded',by:u.name,at:new Date().toLocaleString(),note:`Awarded to ${c.supplier}`});
      pr.updatedAt=now();
      await DB.put('prs',pr);
    }
    toast('Quote awarded!','s');await render();
  };

  return{render,openAdd,save,award};
})();

/* ── PO MODULE ── */
const PO=(()=>{
  const renderList=async()=>{
    const[pos,prs]=await Promise.all([DB.all('pos'),DB.all('prs')]);
    pos.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    document.getElementById('v-po').innerHTML=`
      <div class="ph"><h2>Purchase Orders</h2>
        <button class="btn bg sm" onclick="PO.exportCSV()">⬇ Export CSV</button>
      </div>
      <div class="card"><div class="tw"><table><thead><tr>
        <th>PO No</th><th>PR No</th><th>Vendor</th><th>Buyer</th>
        <th>Date Ordered</th><th>Exp. Delivery</th><th>Total</th><th>Status</th><th>Actions</th>
      </tr></thead><tbody>
      ${pos.length?pos.map(po=>{
        const pr=prs.find(p=>p.id===po.prId);
        const sub=subtotal(po.items);
        return`<tr>
          <td><a href="#" onclick="PO.openDetail('${po.id}');return false" style="color:var(--primary);font-weight:700">${esc(po.poNo)}</a></td>
          <td>${pr?`<a href="#" onclick="PR.openDetail('${pr.id}');return false" style="color:var(--primary)">${esc(pr.prNo)}</a>`:'—'}</td>
          <td style="font-size:.78rem">${esc(po.vendor)}</td>
          <td>${esc(po.buyer||'')}</td>
          <td>${fmtD(po.dateOrdered)}</td>
          <td>${fmtD(po.expectedDelivery)}</td>
          <td class="tr">${fmtM(sub)}</td>
          <td>${sBadge(po.status||'ISSUED')}</td>
          <td style="white-space:nowrap">
            <button class="btn bg sm" onclick="PO.openDetail('${po.id}')">View</button>
            ${(po.status==='ISSUED'||po.status==='PARTIAL')?
              `<button class="btn bs sm" onclick="GRPO.openCreate('${po.id}')">Receive</button>`:''}
          </td>
        </tr>`;
      }).join(''):`<tr><td colspan="9" class="tc" style="color:var(--muted);padding:2rem">No POs yet.</td></tr>`}
      </tbody></table></div></div>`;
  };

  const openCreate=async(prId)=>{
    const[pr,vendors]=await Promise.all([DB.get('prs',prId),DB.all('vendors')]);
    if(!pr)return;
    const u=Auth.user();
    openModal(`Create PO — ${pr.prNo}`,`
      <div class="alert ali">
        <b>${esc(pr.prNo)}</b> · ${esc(pr.location)} · ${esc(pr.requestedBy)} · Needed: ${fmtD(pr.dateNeeded)}
      </div>
      <div class="fr">
        <div class="fg"><label>Vendor *</label>
          <select id="po-ven">
            <option value="">— Select Vendor —</option>
            ${vendors.map(v=>`<option>${esc(v.name)}</option>`).join('')}
          </select></div>
        <div class="fg"><label>Buyer</label>
          <input type="text" id="po-buyer" value="${esc(u.name)}"></div>
      </div>
      <div class="fr">
        <div class="fg"><label>Date Ordered</label><input type="date" id="po-dord" value="${today()}"></div>
        <div class="fg"><label>Expected Delivery</label><input type="date" id="po-ddel" value="${pr.dateNeeded||''}"></div>
        <div class="fg"><label>Payment Terms</label>
          <select id="po-terms"><option>30 days</option><option>60 days</option><option>COD</option><option>Advance</option></select>
        </div>
      </div>
      <div class="fg"><label>Remarks</label><textarea id="po-rem" rows="2"></textarea></div>
      <hr class="sep">
      <label style="font-size:.8rem;font-weight:700;margin-bottom:.5rem;display:block">Items</label>
      <div class="tw"><table class="itbl"><thead><tr>
        <th>#</th><th>Spec Code</th><th>Description</th><th>Qty</th><th>UoM</th>
        <th>Unit Cost (₱)</th><th>Total</th>
      </tr></thead><tbody id="po-items">
        ${(pr.items||[]).map((it,i)=>`<tr data-iid="${it.id}">
          <td>${i+1}</td>
          <td><b>${esc(it.modelSpec)}</b></td>
          <td style="font-size:.78rem">${esc(it.description||'')}</td>
          <td><input type="number" value="${it.qty}" min="1" oninput="PO._recalc()" style="width:68px"></td>
          <td>${esc(it.uom)}</td>
          <td><input type="number" value="${it.unitCost||0}" min="0" step="0.01" oninput="PO._recalc()" style="width:100px"></td>
          <td class="tot-cell">${fmtM(it.qty*(it.unitCost||0))}</td>
        </tr>`).join('')}
      </tbody>
      <tfoot>
        <tr><td colspan="6" class="tr" style="font-size:.78rem;color:var(--muted)">Subtotal</td><td class="tot-cell" id="po-sub">—</td></tr>
        <tr><td colspan="6" class="tr" style="font-size:.78rem;color:var(--muted)">VAT (12%)</td><td class="tot-cell" id="po-vat">—</td></tr>
        <tr class="sum-row"><td colspan="6" class="tr">Grand Total</td><td class="tot-cell" id="po-gt" style="color:var(--primary)">—</td></tr>
      </tfoot></table></div>
      <div style="display:flex;gap:.5rem;margin-top:1rem">
        <button class="btn bp" onclick="PO._save('${prId}')">📋 Issue PO</button>
        <button class="btn bg" onclick="closeModal()">Cancel</button>
      </div>`,true);
    PO._recalc();
  };

  const _recalc=()=>{
    let sub=0;
    document.querySelectorAll('#po-items tr').forEach(tr=>{
      const ins=tr.querySelectorAll('input[type=number]');
      if(ins.length<2)return;
      const t=(+ins[0]?.value||0)*(+ins[1]?.value||0);
      sub+=t;
      const tc=tr.querySelector('.tot-cell');
      if(tc)tc.textContent=fmtM(t);
    });
    const vat=sub*.12;
    const g=id=>document.getElementById(id);
    if(g('po-sub'))g('po-sub').textContent=fmtM(sub);
    if(g('po-vat'))g('po-vat').textContent=fmtM(vat);
    if(g('po-gt'))g('po-gt').textContent=fmtM(sub+vat);
  };

  const _save=async(prId)=>{
    const vendor=document.getElementById('po-ven')?.value;
    if(!vendor){toast('Select a vendor.','e');return;}
    const pr=await DB.get('prs',prId);
    if(!pr)return;
    const u=Auth.user();
    const items=[];
    document.querySelectorAll('#po-items tr').forEach((tr,i)=>{
      const ins=tr.querySelectorAll('input[type=number]');
      const src=pr.items[i];
      if(!src||ins.length<2)return;
      items.push({...src,qty:+ins[0]?.value||src.qty,unitCost:+ins[1]?.value||src.unitCost});
    });
    const po={
      id:uid(),poNo:nextPO(),prId,vendor,
      buyer:document.getElementById('po-buyer')?.value||u.name,
      dateOrdered:document.getElementById('po-dord')?.value||today(),
      expectedDelivery:document.getElementById('po-ddel')?.value||'',
      paymentTerms:document.getElementById('po-terms')?.value||'30 days',
      remarks:document.getElementById('po-rem')?.value||'',
      items,status:'ISSUED',
      audit:[{action:'PO Issued',by:u.name,at:new Date().toLocaleString(),note:`Vendor: ${vendor}`}],
      createdAt:now(),updatedAt:now(),
    };
    await DB.put('pos',po);
    pr.status='PO CREATED';
    pr.audit=pr.audit||[];
    pr.audit.push({action:'PO Created',by:u.name,at:new Date().toLocaleString(),note:`${po.poNo} → ${vendor}`});
    items.forEach(it=>{const prit=pr.items.find(x=>x.id===it.id);if(prit)prit.poQty=it.qty;});
    pr.updatedAt=now();
    await DB.put('prs',pr);
    closeModal();
    toast(`${po.poNo} issued!`,'s');
    await renderList();
  };

  const openDetail=async id=>{
    const po=await DB.get('pos',id);
    if(!po)return;
    const prs=await DB.all('prs');
    const pr=prs.find(p=>p.id===po.prId);
    const sub=subtotal(po.items);
    openModal(po.poNo,`
      <div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.75rem;font-size:.8rem;color:var(--muted)">
        <span>🏭 ${esc(po.vendor)}</span>
        <span>👤 ${esc(po.buyer)}</span>
        <span>📅 Ordered: ${fmtD(po.dateOrdered)}</span>
        <span>🚚 Exp: ${fmtD(po.expectedDelivery)}</span>
        <span>💳 ${esc(po.paymentTerms)}</span>
        <span style="margin-left:auto">${sBadge(po.status)}</span>
      </div>
      ${pr?`<div class="alert ali">📝 PR: <b>${esc(pr.prNo)}</b> · ${esc(pr.location)} · ${esc(pr.requestedBy)}</div>`:''}
      ${po.remarks?`<div class="alert alw">📋 ${esc(po.remarks)}</div>`:''}
      <div class="tw"><table><thead><tr>
        <th>#</th><th>Spec Code</th><th>Description</th><th>Qty</th><th>UoM</th>
        <th>Unit Cost</th><th>Total</th>
      </tr></thead><tbody>
      ${(po.items||[]).map((it,i)=>`<tr>
        <td>${i+1}</td><td><b>${esc(it.modelSpec)}</b></td><td>${esc(it.description||'')}</td>
        <td>${it.qty}</td><td>${esc(it.uom)}</td>
        <td class="tr">${fmtM(it.unitCost)}</td>
        <td class="tr tot-cell">${fmtM(it.qty*it.unitCost)}</td>
      </tr>`).join('')}
      </tbody><tfoot>
        <tr><td colspan="6" class="tr" style="font-size:.78rem;color:var(--muted)">Subtotal</td><td class="tr">${fmtM(sub)}</td></tr>
        <tr class="sum-row"><td colspan="6" class="tr">Grand Total (inc. VAT)</td><td class="tr">${fmtM(sub*1.12)}</td></tr>
      </tfoot></table></div>
      <hr class="sep"><h3 style="font-size:.85rem;margin-bottom:.5rem">Audit Trail</h3>
      <div class="alog">${(po.audit||[]).map(a=>`<div class="ae"><b>${esc(a.action)}</b> by ${esc(a.by)} <span style="color:var(--muted)">@ ${a.at}</span>${a.note?' — '+esc(a.note):''}</div>`).join('')||'<div class="ae" style="color:var(--muted)">No entries.</div>'}</div>
      ${(po.status==='ISSUED'||po.status==='PARTIAL')?
        `<div style="margin-top:1rem"><button class="btn bs" onclick="closeModal();GRPO.openCreate('${id}')">📦 Receive Goods</button></div>`:''}
    `,true);
  };

  const exportCSV=async()=>{
    const pos=await DB.all('pos');
    const rows=pos.flatMap(po=>(po.items||[]).map(it=>({
      PONo:po.poNo,Vendor:po.vendor,Buyer:po.buyer,
      DateOrdered:po.dateOrdered,ExpectedDelivery:po.expectedDelivery,
      PaymentTerms:po.paymentTerms,Status:po.status,
      SpecCode:it.modelSpec,Description:it.description||'',
      Qty:it.qty,UoM:it.uom,UnitCost:it.unitCost,LineTotal:it.qty*it.unitCost,
    })));
    _csv(rows,`POs_${today()}.csv`);
  };

  return{renderList,openCreate,_recalc,_save,openDetail,exportCSV};
})();

        <tr class="sum-row"><td colspan="7" class="tr">Total Received</td><td class="tot-cell" id="gr-total">—</td></tr>
      </tfoot></table></div>
      <div style="display:flex;gap:.5rem;margin-top:1rem">
        <button class="btn bs" onclick="GRPO._save('${poId}')">📦 Post GRPO</button>
        <button class="btn bg" onclick="closeModal()">Cancel</button>
      </div>`,true);
    GRPO._recalc();
  };

  const _recalc=()=>{
    let sub=0;
    document.querySelectorAll('#gr-items tr').forEach(tr=>{
      const inp=tr.querySelector('input[type=number]');
      if(!inp)return;
      const uc=parseFloat(tr.dataset.uc)||0;
      const t=(+inp.value||0)*uc;
      sub+=t;
      const tc=tr.querySelector('.tot-cell');
      if(tc)tc.textContent=fmtM(t);
    });
    const g=document.getElementById('gr-total');
    if(g)g.textContent=fmtM(sub);
  };

  const _save=async(poId)=>{
    const dateReceived=document.getElementById('gr-date')?.value;
    if(!dateReceived){toast('Date received is required.','e');return;}
    const po=await DB.get('pos',poId);
    if(!po)return;
    const u=Auth.user();
    const drNo=document.getElementById('gr-dr')?.value||'';
    const items=[];
    let totalRecv=0,totalPO=0;
    document.querySelectorAll('#gr-items tr').forEach((tr,i)=>{
      const inp=tr.querySelector('input[type=number]');
      const src=po.items[i];
      if(!src||!inp)return;
      const recvQty=+inp.value||0;
      items.push({...src,recvQty});
      totalRecv+=recvQty;
      totalPO+=src.qty;
    });
    if(items.every(it=>it.recvQty===0)){toast('Enter at least one received quantity.','e');return;}
    const grpo={
      id:uid(),grpoNo:nextGR(),poId,prId:po.prId,
      vendor:po.vendor,
      receivedBy:document.getElementById('gr-by')?.value||u.name,
      dateReceived,drNo,
      remarks:document.getElementById('gr-rem')?.value||'',
      items,status:'RECEIVED',
      audit:[{action:'GRPO Posted',by:u.name,at:new Date().toLocaleString(),note:`DR: ${drNo||'—'}`}],
      createdAt:now(),updatedAt:now(),
    };
    await DB.put('grpos',grpo);
    const isComplete=totalRecv>=totalPO;
    po.status=isComplete?'RECEIVED':'PARTIAL';
    po.audit=po.audit||[];
    po.audit.push({action:'Goods Received',by:u.name,at:new Date().toLocaleString(),note:`GRPO: ${grpo.grpoNo}`});
    po.updatedAt=now();
    await DB.put('pos',po);
    const pr=await DB.get('prs',po.prId);
    if(pr){
      pr.status=isComplete?'RECEIVED':'PARTIAL';
      pr.grpoDate=dateReceived;
      pr.audit=pr.audit||[];
      pr.audit.push({action:'Goods Received',by:u.name,at:new Date().toLocaleString(),
        note:`${grpo.grpoNo} — ${isComplete?'Complete':'Partial'}`});
      items.forEach(it=>{const prit=pr.items.find(x=>x.id===it.id);if(prit)prit.grpoQty=(prit.grpoQty||0)+it.recvQty;});
      pr.updatedAt=now();
      await DB.put('prs',pr);
    }
    closeModal();
    toast(`${grpo.grpoNo} posted — ${isComplete?'Complete':'Partial'} receipt!`,'s');
    await renderList();
  };

  const openDetail=async id=>{
    const gr=await DB.get('grpos',id);
    if(!gr)return;
    const sub=gr.items.reduce((s,it)=>s+(it.recvQty||it.qty)*(it.unitCost||0),0);
    openModal(gr.grpoNo,`
      <div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.75rem;font-size:.8rem;color:var(--muted)">
        <span>🏭 ${esc(gr.vendor)}</span>
        <span>👤 Received by: ${esc(gr.receivedBy)}</span>
        <span>📅 ${fmtD(gr.dateReceived)}</span>
        ${gr.drNo?`<span>📄 DR: ${esc(gr.drNo)}</span>`:''}
        <span style="margin-left:auto">${sBadge(gr.status)}</span>
      </div>
      ${gr.remarks?`<div class="alert alw">📋 ${esc(gr.remarks)}</div>`:''}
      <div class="tw"><table><thead><tr>
        <th>#</th><th>Spec Code</th><th>Description</th>
        <th>Recv Qty</th><th>UoM</th><th>Unit Cost</th><th>Total</th>
      </tr></thead><tbody>
      ${gr.items.map((it,i)=>`<tr>
        <td>${i+1}</td><td><b>${esc(it.modelSpec)}</b></td><td>${esc(it.description||'')}</td>
        <td>${it.recvQty||it.qty}</td><td>${esc(it.uom)}</td>
        <td class="tr">${fmtM(it.unitCost||0)}</td>
        <td class="tr tot-cell">${fmtM((it.recvQty||it.qty)*(it.unitCost||0))}</td>
      </tr>`).join('')}
      </tbody><tfoot><tr class="sum-row"><td colspan="6" class="tr">Total</td><td class="tr">${fmtM(sub)}</td></tr></tfoot>
      </table></div>
      <hr class="sep"><h3 style="font-size:.85rem;margin-bottom:.5rem">Audit Trail</h3>
      <div class="alog">${(gr.audit||[]).map(a=>`<div class="ae"><b>${esc(a.action)}</b> by ${esc(a.by)} <span style="color:var(--muted)">@ ${a.at}</span>${a.note?' — '+esc(a.note):''}</div>`).join('')||'<div class="ae" style="color:var(--muted)">No entries.</div>'}</div>
      ${gr.status!=='SAP POSTED'?
        `<div style="margin-top:1rem;display:flex;gap:.5rem">
          <button class="btn bs" onclick="GRPO.postSAP('${id}')">📮 Post to SAP</button>
        </div>`:''}
    `,true);
  };

  const postSAP=async id=>{
    const sapRef=prompt('Enter SAP Reference Number:');
    if(sapRef===null)return;
    if(!sapRef.trim()){toast('SAP reference is required.','e');return;}
    const gr=await DB.get('grpos',id);
    if(!gr)return;
    const u=Auth.user();
    gr.status='SAP POSTED';gr.sapRef=sapRef.trim();
    gr.audit=gr.audit||[];
    gr.audit.push({action:'SAP Posted',by:u.name,at:new Date().toLocaleString(),note:`Ref: ${sapRef.trim()}`});
    gr.updatedAt=now();
    await DB.put('grpos',gr);
    const pr=await DB.get('prs',gr.prId);
    if(pr){
      pr.status='SAP POSTED';pr.sapRef=sapRef.trim();
      pr.audit=pr.audit||[];
      pr.audit.push({action:'SAP Posted',by:u.name,at:new Date().toLocaleString(),note:`Ref: ${sapRef.trim()}`});
      pr.updatedAt=now();
      await DB.put('prs',pr);
    }
    closeModal();
    toast('Posted to SAP!','s');
    await renderList();
  };

  return{renderList,openCreate,_recalc,_save,openDetail,postSAP};
})();

/* ── APPROVAL MODULE ── */
const Approval=(()=>{
  const render=async()=>{
    const u=Auth.user();
    const prs=await DB.all('prs');
    let pending=[];
    if(u.role==='supervisor'||u.role==='admin')
      pending=[...pending,...prs.filter(p=>p.status==='SUPERVISOR REVIEW')];
    if(u.role==='finance'||u.role==='admin')
      pending=[...pending,...prs.filter(p=>p.status==='FINANCE REVIEW')];
    const seen=new Set();
    pending=pending.filter(p=>{if(seen.has(p.id))return false;seen.add(p.id);return true;});
    pending.sort((a,b)=>new Date(a.dateNeeded||'9999')-new Date(b.dateNeeded||'9999'));
    document.getElementById('v-approval').innerHTML=`
      <div class="ph"><h2>Pending Approvals</h2>
        <span class="b b-sub">${pending.length} Pending</span>
      </div>
      ${!pending.length?`<div class="card" style="text-align:center;padding:3rem;color:var(--muted)">
        ✅ No pending approvals — all caught up!
      </div>`:''}
      ${pending.map(pr=>{
        const sub=subtotal(pr.items);
        const needsFin=sub>FIN_THRESHOLD;
        const isFinStage=pr.status==='FINANCE REVIEW';
        return`<div class="card" style="border-left:4px solid ${isFinStage?'var(--warning)':'var(--primary)'}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem">
            <div>
              <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem;flex-wrap:wrap">
                <a href="#" onclick="PR.openDetail('${pr.id}');return false" style="font-weight:700;color:var(--primary);font-size:.95rem">${esc(pr.prNo)}</a>
                ${sBadge(pr.status)}
                ${needsFin&&!isFinStage?`<span class="b b-fin">Finance Required</span>`:''}
              </div>
              <div style="font-size:.8rem;color:var(--muted);display:flex;gap:.75rem;flex-wrap:wrap">
                <span>👤 ${esc(pr.requestedBy)}</span>
                <span>📍 ${esc(pr.location)} · ${esc(pr.department)}</span>
                <span>📅 Needed: ${fmtD(pr.dateNeeded)}</span>
                <span>⏱ ${pr.targetLeadTime||'—'}d target</span>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:1.1rem;font-weight:700;color:var(--primary)">${fmtM(sub)}</div>
              <div style="font-size:.75rem;color:var(--muted)">${(pr.items||[]).length} line item(s)</div>
            </div>
          </div>
          <div style="background:#f8fafc;border-radius:var(--r);padding:.6rem .8rem;margin-bottom:.75rem;font-size:.8rem">
            <b>Justification:</b> ${esc(pr.justification||'—')}
          </div>
          <div class="tw" style="margin-bottom:.75rem"><table><thead><tr>
            <th>Spec Code</th><th>Description</th><th>Qty</th><th>UoM</th><th>Unit Cost</th><th>Total</th>
          </tr></thead><tbody>
          ${(pr.items||[]).map(it=>`<tr>
            <td><b>${esc(it.modelSpec)}</b></td><td style="font-size:.78rem">${esc(it.description||'')}</td>
            <td>${it.qty}</td><td>${esc(it.uom)}</td>
            <td class="tr">${fmtM(it.unitCost)}</td>
            <td class="tr tot-cell">${fmtM(it.qty*it.unitCost)}</td>
          </tr>`).join('')}
          </tbody><tfoot><tr class="sum-row"><td colspan="5" class="tr">Total</td><td class="tr">${fmtM(sub)}</td></tr></tfoot>
          </table></div>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap">
            <button class="btn bs" onclick="Approval._approve('${pr.id}')">✅ Approve</button>
            <button class="btn bd" onclick="Approval._reject('${pr.id}')">❌ Reject</button>
            <button class="btn bg sm" onclick="PR.openDetail('${pr.id}')">👁 View Full PR</button>
          </div>
        </div>`;
      }).join('')}`;
  };

  const _approve=async id=>{
    const pr=await DB.get('prs',id);
    if(!pr)return;
    const u=Auth.user();
    const sub=subtotal(pr.items);
    if(pr.status==='SUPERVISOR REVIEW'){
      pr.status=sub>FIN_THRESHOLD?'FINANCE REVIEW':'APPROVED';
      pr.audit=pr.audit||[];
      pr.audit.push({action:'Supervisor Approved',by:u.name,at:new Date().toLocaleString(),
        note:sub>FIN_THRESHOLD?'Forwarded to Finance for approval':'Fully approved — ready for PO'});
    } else if(pr.status==='FINANCE REVIEW'){
      pr.status='APPROVED';
      pr.audit=pr.audit||[];
      pr.audit.push({action:'Finance Approved',by:u.name,at:new Date().toLocaleString(),note:'Approved — ready for PO creation'});
    } else {
      toast('Cannot approve at this stage.','e');return;
    }
    pr.updatedAt=now();
    await DB.put('prs',pr);
    toast(`${pr.prNo} approved!`,'s');
    await render();
  };

  const _reject=async id=>{
    const reason=prompt('Rejection reason (required):');
    if(reason===null)return;
    if(!reason.trim()){toast('Reason is required.','e');return;}
    const pr=await DB.get('prs',id);
    if(!pr)return;
    const u=Auth.user();
    pr.status='REJECTED';
    pr.audit=pr.audit||[];
    pr.audit.push({action:'Rejected',by:u.name,at:new Date().toLocaleString(),note:reason.trim()});
    pr.updatedAt=now();
    await DB.put('prs',pr);
    toast(`${pr.prNo} rejected.`,'w');
    await render();
  };

  return{render,_approve,_reject};
})();

/* ── REPORTS MODULE ── */
const Reports=(()=>{
  const render=async()=>{
    const[prs,pos,grpos]=await Promise.all([DB.all('prs'),DB.all('pos'),DB.all('grpos')]);
    const totalSpend=grpos.reduce((s,g)=>s+g.items.reduce((ss,it)=>ss+(it.recvQty||it.qty)*(it.unitCost||0),0),0);
    const poSpend=pos.reduce((s,p)=>s+subtotal(p.items),0);
    const byLoc={};
    prs.forEach(p=>{
      if(!byLoc[p.location])byLoc[p.location]={loc:p.location,count:0,total:0,approved:0,rejected:0};
      byLoc[p.location].count++;
      byLoc[p.location].total+=subtotal(p.items);
      if(['APPROVED','PO CREATED','PARTIAL','RECEIVED','SAP POSTED'].includes(p.status))byLoc[p.location].approved++;
      if(p.status==='REJECTED')byLoc[p.location].rejected++;
    });
    const byDept={};
    prs.forEach(p=>{
      if(!byDept[p.department])byDept[p.department]={dept:p.department,count:0,total:0};
      byDept[p.department].count++;byDept[p.department].total+=subtotal(p.items);
    });
    const byStatus={};
    prs.forEach(p=>{if(!byStatus[p.status])byStatus[p.status]=0;byStatus[p.status]++;});
    const byVendor={};
    pos.forEach(po=>{if(!byVendor[po.vendor])byVendor[po.vendor]=0;byVendor[po.vendor]+=subtotal(po.items);});
    const topVendors=Object.entries(byVendor).sort((a,b)=>b[1]-a[1]).slice(0,10);
    const withLead=prs.filter(p=>p.grpoDate&&p.dateRequested);
    const avgLead=withLead.length?Math.round(withLead.reduce((s,p)=>s+daysApart(p.dateRequested,p.grpoDate),0)/withLead.length):null;
    document.getElementById('v-reports').innerHTML=`
      <div class="ph"><h2>Reports &amp; Analytics</h2>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          <button class="btn bg sm" onclick="Reports.exportPRs()">⬇ Export PRs</button>
          <button class="btn bg sm" onclick="Reports.exportPOs()">⬇ Export POs</button>
        </div>
      </div>
      <div class="kpi-grid">
        <div class="kpi"><p>Total PRs</p><h3>${prs.length}</h3></div>
        <div class="kpi kw"><p>Total PO Value</p><h3 style="font-size:.85rem;margin-top:.2rem">${fmtM(poSpend)}</h3></div>
        <div class="kpi ks"><p>Total Received</p><h3 style="font-size:.85rem;margin-top:.2rem">${fmtM(totalSpend)}</h3></div>
        <div class="kpi"><p>Avg Lead Time</p><h3>${avgLead??'—'}<span style="font-size:.75rem;font-weight:400"> days</span></h3></div>
        <div class="kpi"><p>Active POs</p><h3>${pos.filter(p=>p.status==='ISSUED'||p.status==='PARTIAL').length}</h3></div>
        <div class="kpi kd"><p>Rejected PRs</p><h3>${prs.filter(p=>p.status==='REJECTED').length}</h3></div>
      </div>
      <div class="g2">
        <div class="card"><h3>PRs by Status</h3>
          <div class="tw"><table><thead><tr><th>Status</th><th class="tr">Count</th><th class="tr">%</th></tr></thead><tbody>
          ${Object.entries(byStatus).sort((a,b)=>b[1]-a[1]).map(([s,c])=>`<tr>
            <td>${sBadge(s)}</td><td class="tr">${c}</td>
            <td class="tr">${prs.length?Math.round(c/prs.length*100):0}%</td>
          </tr>`).join('')||'<tr><td colspan="3" class="tc" style="color:var(--muted)">No data</td></tr>'}
          </tbody></table></div>
        </div>
        <div class="card"><h3>Spend by Location</h3>
          <div class="tw"><table><thead><tr><th>Location</th><th class="tr">PRs</th><th class="tr">Value</th><th class="tr">Approved</th><th class="tr">Rejected</th></tr></thead><tbody>
          ${Object.values(byLoc).sort((a,b)=>b.total-a.total).map(r=>`<tr>
            <td><b>${esc(r.loc)}</b></td><td class="tr">${r.count}</td>
            <td class="tr">${fmtM(r.total)}</td>
            <td class="tr" style="color:var(--success)">${r.approved}</td>
            <td class="tr" style="color:var(--danger)">${r.rejected}</td>
          </tr>`).join('')||'<tr><td colspan="5" class="tc" style="color:var(--muted)">No data</td></tr>'}
          </tbody></table></div>
        </div>
      </div>
      <div class="g2">
        <div class="card"><h3>Spend by Department</h3>
          <div class="tw"><table><thead><tr><th>Department</th><th class="tr">PRs</th><th class="tr">Total Value</th></tr></thead><tbody>
          ${Object.values(byDept).sort((a,b)=>b.total-a.total).map(r=>`<tr>
            <td><b>${esc(r.dept)}</b></td><td class="tr">${r.count}</td><td class="tr">${fmtM(r.total)}</td>
          </tr>`).join('')||'<tr><td colspan="3" class="tc" style="color:var(--muted)">No data</td></tr>'}
          </tbody></table></div>
        </div>
        <div class="card"><h3>Top Vendors by PO Value</h3>
          <div class="tw"><table><thead><tr><th>Vendor</th><th class="tr">PO Value</th></tr></thead><tbody>
          ${topVendors.map(([v,a])=>`<tr>
            <td style="font-size:.78rem">${esc(v)}</td><td class="tr">${fmtM(a)}</td>
          </tr>`).join('')||'<tr><td colspan="2" class="tc" style="color:var(--muted)">No data</td></tr>'}
          </tbody></table></div>
        </div>
      </div>
      <div class="card"><h3>Purchase Request Tracker (Recent 50)</h3>
        <div class="tw"><table><thead><tr>
          <th>PR No</th><th>Requestor</th><th>Location</th><th>Dept</th>
          <th>Date Requested</th><th>Date Needed</th><th>Total</th><th>Status</th><th>Lead Time</th><th>SAP Ref</th>
        </tr></thead><tbody>
        ${[...prs].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,50).map(p=>{
          const sub=subtotal(p.items);
          const act=p.grpoDate&&p.dateRequested?daysApart(p.dateRequested,p.grpoDate):null;
          return`<tr>
            <td><a href="#" onclick="PR.openDetail('${p.id}');return false" style="color:var(--primary);font-weight:700">${esc(p.prNo)}</a></td>

            <td>${fmtD(p.dateRequested)}</td><td>${fmtD(p.dateNeeded)}</td>
            <td class="tr">${fmtM(sub)}</td>
            <td>${sBadge(p.status)}</td>
            <td>${delBadge(act,p.targetLeadTime)}</td>
            <td>${esc(p.sapRef||'—')}</td>
          </tr>`;
        }).join('')||'<tr><td colspan="10" class="tc" style="color:var(--muted);padding:1.5rem">No data yet.</td></tr>'}
        </tbody></table></div>
      </div>`;
  };

  const exportPRs=async()=>{
    const prs=await DB.all('prs');
    const rows=prs.flatMap(p=>(p.items||[]).map(it=>({
      PRNo:p.prNo,Status:p.status,RequestedBy:p.requestedBy,
      Location:p.location,Department:p.department,
      DateRequested:p.dateRequested,DateNeeded:p.dateNeeded,
      TargetLeadDays:p.targetLeadTime,Category:p.category||'',
      ModelSpec:it.modelSpec,Description:it.description||'',
      ReqQty:it.qty,POQty:it.poQty||0,GRPOQty:it.grpoQty||0,
      UoM:it.uom,UnitCost:it.unitCost,LineTotal:it.qty*it.unitCost,
      Justification:p.justification||'',SAPRef:p.sapRef||'',CreatedAt:p.createdAt,
    })));
    _csv(rows,`PRs_${today()}.csv`);
  };

  const exportPOs=async()=>{
    const pos=await DB.all('pos');
    const rows=pos.flatMap(po=>(po.items||[]).map(it=>({
      PONo:po.poNo,Vendor:po.vendor,Buyer:po.buyer,
      DateOrdered:po.dateOrdered,ExpectedDelivery:po.expectedDelivery,
      PaymentTerms:po.paymentTerms,Status:po.status,
      SpecCode:it.modelSpec,Description:it.description||'',
      Qty:it.qty,UoM:it.uom,UnitCost:it.unitCost,LineTotal:it.qty*it.unitCost,
    })));
    _csv(rows,`POs_${today()}.csv`);
  };

  return{render,exportPRs,exportPOs};
})();

  const openForm=async(eid=null)=>{
    _eid=eid;
    const v=eid?await DB.get('vendors',eid):null;
    openModal(eid?'Edit Vendor':'Add Vendor',`
      <div class="fg"><label>Vendor Name *</label>
        <input type="text" id="v-name" value="${esc(v?.name||'')}" placeholder="Full company name"></div>
      <div class="fr">
        <div class="fg"><label>Contact Person</label><input type="text" id="v-con" value="${esc(v?.contact||'')}"></div>
        <div class="fg"><label>Phone</label><input type="text" id="v-ph" value="${esc(v?.phone||'')}"></div>
      </div>
      <div class="fg"><label>Email</label><input type="email" id="v-em" value="${esc(v?.email||'')}"></div>
      <div class="fg"><label>Address</label><textarea id="v-addr" rows="2">${esc(v?.address||'')}</textarea></div>
      <div style="display:flex;gap:.5rem;margin-top:.75rem">
        <button class="btn bs" onclick="Vendors.save()">Save Vendor</button>
        <button class="btn bg" onclick="closeModal()">Cancel</button>
      </div>`);
  };

  const save=async()=>{
    const name=document.getElementById('v-name')?.value.trim();
    if(!name){toast('Vendor name is required.','e');return;}
    const v={
      id:_eid||uid(),name,
      contact:document.getElementById('v-con')?.value||'',
      phone:document.getElementById('v-ph')?.value||'',
      email:document.getElementById('v-em')?.value||'',
      address:document.getElementById('v-addr')?.value||'',
    };
    await DB.put('vendors',v);
    toast('Vendor saved.','s');closeModal();await render();
  };

  const del=async id=>{
    if(!confirm('Delete this vendor?'))return;
    await DB.del('vendors',id);
    toast('Vendor deleted.','s');await render();
  };

  return{render,filter,openForm,save,del};
})();

/* ── INIT ── */
(async()=>{
  try{
    await DB.open();
    await DB.seed();
  }catch(e){
    console.error('DB init failed',e);
    alert('Failed to initialize database. Please use a modern browser with IndexedDB support.');
  }
})();
</script>
